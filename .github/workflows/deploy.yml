name: Deploy DaaS Backend to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Slack Notification - Started
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'warning'
          SLACK_MESSAGE: '🚀 Deployment of DaaS Backend to DigitalOcean started...'
          SLACK_TITLE: 'Deployment Started'
          SLACK_USERNAME: 'DaaS Bot'


      - name: Add SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH and Docker Compose
        run: |
          # Ensure target directory exists on DigitalOcean Droplet
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/html/bakenddelivery"
          
          # Copy project files to DigitalOcean Droplet
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude='.git' --exclude='.github' ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/html/bakenddelivery/
          
          # Execute docker compose rebuild on the server
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /var/www/html/bakenddelivery && docker compose down && docker compose up -d --build"

      - name: Slack Notification - Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'good'
          SLACK_MESSAGE: '✅ Deployment of DaaS Backend to DigitalOcean finished successfully!'
          SLACK_TITLE: 'Deployment Success'
          SLACK_USERNAME: 'DaaS Bot'

      - name: Slack Notification - Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'danger'
          SLACK_MESSAGE: '❌ Deployment of DaaS Backend to DigitalOcean failed. Please check the GitHub Actions logs.'
          SLACK_TITLE: 'Deployment Failed'
          SLACK_USERNAME: 'DaaS Bot'
