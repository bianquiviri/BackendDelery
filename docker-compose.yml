version: '3.8'

services:
  app:
    build: .
    container_name: daas_backend
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - GIN_MODE=release # Default for security and performance
      # Points to the host machine where the external Postgres container is running.
      # You may need to use host.docker.internal or the host's actual LAN IP based on your Docker setup.
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_NAME=${DB_NAME:-daas_db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SSLMODE=disable
    networks:
      - daas_network
    restart: unless-stopped



networks:
  daas_network:
    driver: bridge
